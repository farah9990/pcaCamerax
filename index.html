<!DOCTYPE html>="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اكتشف مكونات الحاسب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* ✅ نفس الكرت القديم لكن أكبر */
.game-container {
    width: 90%;
    max-width: 420px;
    background: #020617;
    border-radius: 20px;
    padding: 20px;
    box-shadow:
        0 0 30px rgba(34,211,238,0.25),
        inset 0 0 0 1px rgba(34,211,238,0.3);
    text-align: center;
}

h1 {
    font-size: 20px;
    margin-bottom: 16px;
}
h1 span { color: #22d3ee; }

/* ✅ مربع الكاميرا */
.camera-box {
    width: 100%;
    height: 260px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #22d3ee;
    margin-bottom: 12px;
}

.camera-box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.status-box {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #22d3ee;
    background: linear-gradient(90deg, #020617, #0f172a);
    color: #22d3ee;
    font-size: 15px;
}

.hint {
    margin-top: 8px;
    font-size: 13px;
    color: #94a3b8;
}

/* ✅ تكبير بسيط للجوال */
@media (max-width: 480px) {
    .camera-box { height: 300px; }
}
</style>
</head>

<body>
<div class="game-container">
    <h1>🎮 <span>اكتشف مكونات الحاسب</span></h1>

    <div class="camera-box" id="webcam-container"></div>

    <div class="status-box" id="result">جاري الاكتشاف...</div>

    <div class="hint">وجّه الكاميرا نحو أحد مكونات الحاسب</div>
</div>

<script>
const URL = "./my_model/";
let model, video;

async function init() {
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;

    document.getElementById("webcam-container").appendChild(video);
    requestAnimationFrame(loop);
}

async function loop() {
    if (video.readyState === 4) {
        const p = await model.predict(video);
        let best = p.reduce((a,b)=>a.probability>b.probability?a:b);

        document.getElementById("result").innerText =
            best.probability > 0.3
            ? "✅ تم التعرف على: " + best.className
            : "جاري الاكتشاف...";
    }
    requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
