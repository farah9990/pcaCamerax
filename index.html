<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اكتشف مكونات الحاسب</title>

    <!-- خط عربي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <!-- TensorFlow & Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ✅ الحاوية الرئيسية – ملء شاشة الجوال */
        .game-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin: 8px 0;
        }

        h1 span {
            color: #22d3ee;
        }

        /* ✅ الكاميرا كبيرة ومناسبة */
        .camera-box {
            width: 100%;
            height: 60vh;                 /* أهم سطر */
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #22d3ee;
            box-shadow: 0 0 20px rgba(34,211,238,0.4);
        }

        .camera-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-box {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #22d3ee;
            background: linear-gradient(90deg, #020617, #0f172a);
            color: #22d3ee;
            font-size: 17px;
            text-align: center;
            box-shadow: inset 0 0 12px rgba(34,211,238,0.25);
        }

        .hint {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="game-container">

    <h1>🎮 <span>اكتشف مكونات الحاسب</span></h1>

    <div class="camera-box" id="webcam-container"></div>

    <div class="status-box" id="result">
        جاري الاكتشاف...
    </div>

    <div class="hint">
        وجّه الكاميرا نحو أحد مكونات الحاسب
    </div>

</div>

<script>
const URL = "./my_model/";
let model, video;

async function init() {
    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video = document.createElement("video");
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        document.getElementById("webcam-container").appendChild(video);
        requestAnimationFrame(loop);

    } catch (e) {
        document.getElementById("result").innerText = "❌ تعذر تشغيل الكاميرا";
        console.error(e);
    }
}

async function loop() {
    if (video && video.readyState === 4) {
        const predictions = await model.predict(video);

        let best = predictions[0];
        for (let p of predictions) {
            if (p.probability > best.probability) best = p;
        }

        document.getElementById("result").innerText =
            best.probability > 0.3
            ? "✅ تم التعرف على: " + best.className
            : "جاري الاكتشاف...";
    }
    requestAnimationFrame(loop);
}

init();
</script>

</body>
</html>
