<!DOCTYPE html>
<html<head><html lang="ar" dir="rtl">
    <meta charset="UTF-8">
    <title>اكتشف مكونات الحاسب</title>

    <!-- خط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <!-- TensorFlow & Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-container {
            width: 420px;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            background: #020617;
            box-shadow:
                0 0 25px rgba(34, 211, 238, 0.25),
                inset 0 0 0 1px rgba(34, 211, 238, 0.3);
        }

        h1 {
            margin-bottom: 16px;
            font-size: 26px;
        }

        h1 span {
            color: #22d3ee;
        }

        .camera-box {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #22d3ee;
            margin-bottom: 16px;
        }

        .camera-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-box {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #22d3ee;
            background: linear-gradient(90deg, #020617, #0f172a);
            color: #22d3ee;
            font-size: 18px;
            box-shadow: inset 0 0 12px rgba(34,211,238,0.3);
        }

        /* ✅ تحسين الجوال */
        @media (max-width: 600px) {
            .game-container {
                width: 95%;
                padding: 16px;
            }

            .camera-box {
                aspect-ratio: 3 / 4; /* أنسب للجوال */
            }

            h1 {
                font-size: 20px;
            }

            .status-box {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
<div class="game-container">
    <h1>🎮 <span>اكتشف مكونات الحاسب</span></h1>

    <div class="camera-box" id="webcam-container"></div>

    <div class="status-box" id="result">
        جاري الاكتشاف...
    </div>
</div>

<script>
const URL = "./my_model/";
let model, video;

async function init() {
    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // تحميل النموذج
        model = await tmImage.load(modelURL, metadataURL);

        // تشغيل كاميرا الجوال (الخلفية)
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video = document.createElement("video");
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        document.getElementById("webcam-container").appendChild(video);

        requestAnimationFrame(loop);

    } catch (err) {
        document.getElementById("result").innerText = "❌ تعذر تشغيل الكاميرا";
        console.error(err);
    }
}

async function loop() {
    if (video && video.readyState === 4) {
        const predictions = await model.predict(video);

        let best = predictions[0];
        for (let p of predictions) {
            if (p.probability > best.probability) best = p;
        }

        if (best.probability > 0.3) {
            document.getElementById("result").innerText =
                "✅ تم التعرف على: " + best.className +
                " (" + best.probability.toFixed(2) + ")";
        } else {
            document.getElementById("result").innerText = "جاري الاكتشاف...";
        }
    }
    requestAnimationFrame(loop);
}

// تشغيل تلقائي
init();
</script>
</body>
</html>
